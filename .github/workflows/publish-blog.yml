name: Publish Blog

on:
  push:
    branches: [main]
    paths:
      - 'archive/*.md'
      - 'registry.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect blog changes
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- 'archive/*.md' 'registry.json' | head -1)
          NEW_FILE=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'archive/*.md' | head -1)

          if [ -z "$CHANGED_FILES" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "changed=true" >> $GITHUB_OUTPUT

          if [ -n "$NEW_FILE" ]; then
            echo "slug=$(basename "$NEW_FILE" .md)" >> $GITHUB_OUTPUT
            echo "new_post=true" >> $GITHUB_OUTPUT
          else
            echo "new_post=false" >> $GITHUB_OUTPUT
          fi

      - name: Revalidate Vercel cache
        if: steps.detect.outputs.changed == 'true'
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: chmod +x scripts/revalidate.sh && ./scripts/revalidate.sh

      - name: Broadcast to email subscribers
        if: steps.detect.outputs.new_post == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_SEGMENT_ID: ${{ secrets.RESEND_SEGMENT_ID }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: chmod +x scripts/broadcast.sh && ./scripts/broadcast.sh "${{ steps.detect.outputs.slug }}"
