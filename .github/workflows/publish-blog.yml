name: Publish Blog

on:
  push:
    branches: [main]
    paths:
      - 'archive/*.md'
      - 'registry.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new blog posts
        id: detect
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'archive/*.md' | head -1)
          if [ -z "$NEW_FILES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "slug=$(basename "$NEW_FILES" .md)" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Revalidate Vercel cache
        if: steps.detect.outputs.skip == 'false'
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: chmod +x scripts/revalidate.sh && ./scripts/revalidate.sh

      - name: Broadcast to email subscribers
        if: steps.detect.outputs.skip == 'false'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_SEGMENT_ID: ${{ secrets.RESEND_SEGMENT_ID }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: chmod +x scripts/broadcast.sh && ./scripts/broadcast.sh "${{ steps.detect.outputs.slug }}"
